<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Pagina non trovata | Societa Agricola Farina 2.0</title>
    <style>
      :root {
        --bg: #faf8f3;
        --fg: #132f24;
        --muted: rgba(19, 47, 36, 0.65);
        --card: rgba(255, 255, 255, 0.65);
        --border: rgba(19, 47, 36, 0.12);
        --accent: #c96b2c;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--fg);
        background:
          radial-gradient(900px 500px at 20% 10%, rgba(201, 107, 44, 0.12), transparent 60%),
          radial-gradient(700px 420px at 85% 25%, rgba(20, 92, 60, 0.12), transparent 55%),
          var(--bg);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }

      .card {
        width: min(760px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        text-decoration: none;
        color: var(--fg);
        background: rgba(255, 255, 255, 0.8);
        transition: transform 160ms ease, background 160ms ease;
      }

      a:hover { transform: translateY(-1px); background: rgba(255, 255, 255, 0.95); }

      a.primary {
        background: var(--fg);
        color: white;
        border-color: rgba(19, 47, 36, 0.2);
      }

      a.primary:hover { background: #0f241c; }

      .hint {
        margin-top: 14px;
        font-size: 13px;
        color: rgba(19, 47, 36, 0.55);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Pagina non trovata (404)</h1>
      <p>
        La pagina che cerchi non esiste o e' stata spostata.
        Puoi tornare alla home oppure contattarci.
      </p>
      <div class="actions">
        <a class="primary" href="/">Torna alla home</a>
        <a href="/contatti">Contatti</a>
        <a href="/prodotti">Prodotti</a>
      </div>
      <p class="hint">Societa Agricola Farina 2.0</p>
    </main>
  </body>
</html>
